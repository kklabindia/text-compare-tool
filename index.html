<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Text Compare Tool</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --border-color: #cccccc;
            --match-color: #e8f0fe; /* Light blue background for exact matches */
            --match-text: #1967d2;
            --del-color: #ffeef0; /* Light red for deletions */
            --del-text: #d73a49;
            --ins-color: #e6ffed; /* Light green for insertions */
            --ins-text: #22863a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .text-panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .text-panels {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 8px;
        }

        textarea {
            height: 220px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #007bff;
        }

        /* Center Control Row (Status + Clear Button) */
        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            min-height: 36px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 20px;
        }

        .status-matched {
            color: #22863a;
            background-color: #e6ffed;
            border: 1px solid #22863a;
        }

        .status-not-matched {
            color: #d73a49;
            background-color: #ffeef0;
            border: 1px solid #d73a49;
        }

        /* Clear Button Styling */
        .clear-btn {
            padding: 7px 18px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background-color: #5a6268;
        }

        .output-box {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            background: #fafafa;
            min-height: 120px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        /* Character-level highlighting styles */
        .match-text {
            background-color: var(--match-color);
            color: var(--match-text);
            border-bottom: 1px solid rgba(25, 103, 210, 0.2);
        }

        del {
            background-color: var(--del-color);
            color: var(--del-text);
            text-decoration: line-through;
            font-weight: bold;
            padding: 0 1px;
        }

        ins {
            background-color: var(--ins-color);
            color: var(--ins-text);
            text-decoration: none;
            font-weight: bold;
            padding: 0 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Live Text Comparison</h1>
    <div class="subtitle">Results update instantly as you type or paste text below.</div>
    
    <div class="text-panels">
        <div class="panel">
            <label for="text1">Original Text</label>
            <textarea id="text1" placeholder="Type or paste original text..." oninput="autoCompare()"></textarea>
        </div>
        <div class="panel">
            <label for="text2">Modified Text</label>
            <textarea id="text2" placeholder="Type or paste modified text..." oninput="autoCompare()"></textarea>
        </div>
    </div>

    <!-- Center Control Row -->
    <div class="controls-row">
        <div id="statusBadge"></div>
        <button id="clearBtn" class="clear-btn" onclick="clearSession()">Clear</button>
    </div>

    <h2>Comparison Breakdown:</h2>
    <div id="output" class="output-box">Waiting for text in both boxes to begin comparison...</div>
</div>

<script>
// Inline Diff-Match-Patch Engine to ensure 100% offline reliability

// Main comparison wrapper function
const dmp = new diff_match_patch();

function autoCompare() {
    const text1 = document.getElementById('text1').value;
    const text2 = document.getElementById('text2').value;
    const output = document.getElementById('output');
    const statusBadge = document.getElementById('statusBadge');

    // Requirement: Don't evaluate if both boxes are completely empty
    if (text1.trim() === "" && text2.trim() === "") {
        output.innerHTML = "Waiting for text in both boxes to begin comparison...";
        statusBadge.innerHTML = "";
        return;
    }

    // Handle real-time Status Badge checking
    if (text1 === text2) {
        statusBadge.innerHTML = '<span class="status-badge status-matched">✓ Text Matched</span>';
    } else {
        statusBadge.innerHTML = '<span class="status-badge status-not-matched">✗ Text Not Matched</span>';
    }

    // Generate diff matrix
    const diffs = dmp.diff_main(text1, text2);
    
    // Semantic cleanup makes character-level differences cleaner to read
    dmp.diff_cleanupSemantic(diffs);

    let htmlResult = '';
    
    diffs.forEach((part) => {
        const operation = part[0]; // 0 = Equal, 1 = Insert, -1 = Delete
        const text = part[1].replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

        if (operation === 0) {
            htmlResult += `<span class="match-text">${text}</span>`;
        } else if (operation === 1) {
            htmlResult += `<ins>${text}</ins>`;
        } else if (operation === -1) {
            htmlResult += `<del>${text}</del>`;
        }
    });

    output.innerHTML = htmlResult;
}

// Function to reset fields and begin a new session
function clearSession() {
    document.getElementById('text1').value = "";
    document.getElementById('text2').value = "";
    document.getElementById('statusBadge').innerHTML = "";
    document.getElementById('output').innerHTML = "Waiting for text in both boxes to begin comparison...";
    document.getElementById('text1').focus(); // Automatically focuses on left box for immediate reuse
}
</script>

</body>
</html>
